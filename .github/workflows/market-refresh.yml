name: market-refresh

on:
  schedule:
    # GitHub Cron läuft in UTC. Für feste deutsche Zeiten (Europe/Berlin)
    # triggern wir Sommer- und Winterzeit-Kandidaten und filtern unten im Job.
    - cron: "15 6 * * 1-5"
    - cron: "15 7 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "15 20 * * 1-5"
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
    inputs:
      job_id:
        description: Refresh-Job-ID aus der Streamlit-App
        required: false
        type: string
      job_type:
        description: refresh_universe | rescue_missing | auto_remap
        required: false
        default: refresh_universe
        type: string
      requested_by:
        description: Optionaler Auslöser
        required: false
        type: string

jobs:
  run-refresh-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh worker
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_JOB_ID: ${{ inputs.job_id }}
          INPUT_JOB_TYPE: ${{ inputs.job_type }}
          INPUT_REQUESTED_BY: ${{ inputs.requested_by }}
        run: |
          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            LOCAL_HM="$(TZ=Europe/Berlin date +%H:%M)"
            if [[ "${LOCAL_HM}" != "08:15" && "${LOCAL_HM}" != "16:00" && "${LOCAL_HM}" != "22:15" ]]; then
              echo "Skip schedule trigger at ${LOCAL_HM} Europe/Berlin (not a target refresh time)."
              exit 0
            fi
            python worker.py \
              --job-type "refresh_universe" \
              --requested-by "github_schedule" \
              --create-job-if-missing \
              --min-interval-hours 0
          else
            python worker.py \
              --job-id "${INPUT_JOB_ID}" \
              --job-type "${INPUT_JOB_TYPE}" \
              --requested-by "${INPUT_REQUESTED_BY}"
          fi
